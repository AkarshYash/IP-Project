# Render.com deployment configuration
services:
  # Backend API Service
  - type: web
    name: sahayak-api
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false  # Add manually in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        value: https://sahayak-frontend.vercel.app
    healthCheckPath: /health
    
  # PostgreSQL Database (optional, upgrade to paid for production)
  # - type: pserv
  #   name: sahayak-db
  #   env: postgres
  #   plan: free
  #   ipAllowList: []
