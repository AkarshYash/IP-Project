<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sahayak — Workers</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👷</text></svg>">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <header class="topbar" id="topbar"></header>

    <div class="page-body">
      <!-- Stats Row -->
      <div class="stats-grid mb-24" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
        <div class="stat-card emerald">
          <div class="stat-icon emerald">👷</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-total">500</div>
            <div class="stat-label">Total Workers</div>
          </div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon blue">🟢</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-available">—</div>
            <div class="stat-label">Available Now</div>
          </div>
        </div>
        <div class="stat-card amber">
          <div class="stat-icon amber">⭐</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-avg-rating">4.2</div>
            <div class="stat-label">Avg Rating</div>
          </div>
        </div>
        <div class="stat-card saffron">
          <div class="stat-icon saffron">🏙️</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-cities">—</div>
            <div class="stat-label">Cities</div>
          </div>
        </div>
        <div class="stat-card ruby">
          <div class="stat-icon ruby">💼</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-designations">—</div>
            <div class="stat-label">Designations</div>
          </div>
        </div>
        <div class="stat-card emerald">
          <div class="stat-icon emerald">💰</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-avg-rate">—</div>
            <div class="stat-label">Avg Rate/hr</div>
          </div>
        </div>
      </div>

      <!-- Search & Filters -->
      <div class="card mb-24">
        <div class="flex items-center gap-16 flex-wrap">
          <div class="search-bar" style="flex:1;min-width:200px">
            <span class="search-icon">🔍</span>
            <input 
              type="text" 
              id="search-input" 
              placeholder="Search workers by skill, city, or name... (semantic AI search)"
              oninput="handleSearch(this.value)"
            >
          </div>
          <select class="select" id="filter-designation" onchange="applyFilters()" style="width:180px">
            <option value="">All Designations</option>
          </select>
          <select class="select" id="filter-city" onchange="applyFilters()" style="width:150px">
            <option value="">All Cities</option>
          </select>
          <select class="select" id="filter-availability" onchange="applyFilters()" style="width:150px">
            <option value="">All Availability</option>
            <option value="Available Today">Available Today</option>
            <option value="Available">Available</option>
            <option value="Busy">Busy</option>
          </select>
          <select class="select" id="filter-rating" onchange="applyFilters()" style="width:130px">
            <option value="">Any Rating</option>
            <option value="4.5">4.5+ ⭐</option>
            <option value="4.0">4.0+ ⭐</option>
            <option value="3.5">3.5+ ⭐</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="clearFilters()">✕ Clear</button>
        </div>
        <div class="flex items-center gap-8 mt-16">
          <span class="text-sm text-muted" id="worker-count">Loading workers...</span>
          <span style="margin-left:auto">
            <button class="btn btn-primary btn-sm" onclick="showUploadModal()">
              📤 Add Worker
            </button>
          </span>
        </div>
      </div>

      <!-- Workers Grid -->
      <div class="workers-grid" id="workers-grid">
        <div class="spinner"></div>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="pagination"></div>
    </div>
  </main>
</div>

<!-- Worker Detail Modal -->
<div id="worker-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center"></div>

<!-- Add Worker Modal -->
<div id="upload-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <div class="modal-title">📤 Add / Verify Worker</div>
      <button class="modal-close" onclick="closeUploadModal()">✕</button>
    </div>
    <div>
      <p class="text-muted" style="margin-bottom:16px;font-size:14px">
        Upload a worker's certificate or ID photo for AI-powered verification using Gemini Vision.
      </p>
      <div class="form-group">
        <label class="form-label">Worker ID (optional)</label>
        <input class="input" id="verify-worker-id" placeholder="e.g. W0001">
      </div>
      <div class="form-group">
        <label class="form-label">Document Photo</label>
        <input type="file" class="input" id="verify-file" accept="image/*">
      </div>
      <button class="btn btn-primary w-full" onclick="verifyDocument()">
        🤖 Verify with AI
      </button>
      <div id="verify-result" style="margin-top:16px;display:none"></div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/static/js/app.js"></script>
<script src="/static/js/workers.js"></script>
<script>
  window.ACTIVE_PAGE = 'workers';

  function showUploadModal() {
    document.getElementById('upload-modal').style.display = 'flex';
  }

  function closeUploadModal() {
    document.getElementById('upload-modal').style.display = 'none';
  }

  async function verifyDocument() {
    const file = document.getElementById('verify-file').files[0];
    if (!file) { showToast('Please select a file', 'warning'); return; }

    const fd = new FormData();
    fd.append('file', file);

    const resultDiv = document.getElementById('verify-result');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = '<div class="spinner"></div>';

    try {
      const data = await api.upload('/api/chatbot/verify-document', fd);
      resultDiv.innerHTML = `
        <div class="card">
          <div style="font-weight:700;margin-bottom:8px">
            ${data.is_valid_document ? '✅ Document appears valid' : '⚠️ Manual review needed'}
          </div>
          <div class="session-stat">
            <span class="session-stat-label">Name</span>
            <span class="session-stat-value">${data.full_name || '—'}</span>
          </div>
          <div class="session-stat">
            <span class="session-stat-label">Designation</span>
            <span class="session-stat-value">${data.designation || '—'}</span>
          </div>
          <div class="session-stat">
            <span class="session-stat-label">Confidence</span>
            <span class="session-stat-value">${data.confidence || 0}%</span>
          </div>
          ${data.flags?.length ? `<div style="margin-top:8px;color:var(--amber-light);font-size:13px">⚠️ ${data.flags.join(', ')}</div>` : ''}
        </div>
      `;
    } catch (e) {
      resultDiv.innerHTML = `<div class="badge badge-danger">Verification failed: ${e.message}</div>`;
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    buildSidebar('workers');
    buildTopbar('👷 Workers', 'Manage & Search');
    loadFilterOptions();
    loadWorkers();
  });

  // Close modals on overlay click
  document.getElementById('worker-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('worker-modal')) closeModal();
  });
  document.getElementById('upload-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('upload-modal')) closeUploadModal();
  });
</script>
</body>
</html>
