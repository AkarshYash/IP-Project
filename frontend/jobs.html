<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sahayak — Job Postings</title>
  <meta name="description" content="Browse and post blue-collar job opportunities">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .job-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .job-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--grad-saffron);
      transform: scaleX(0);
      transform-origin: left;
      transition: var(--transition);
    }
    .job-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--saffron); }
    .job-card:hover::before { transform: scaleX(1); }
    .job-card.urgent { border-left: 4px solid var(--ruby-light); }
    .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .match-worker-card {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      transition: var(--transition);
    }
    .match-worker-card:hover { border-color: var(--saffron); background: var(--bg-card); }
    .match-score-badge {
      background: var(--saffron-glow);
      color: var(--saffron);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      margin-left: auto;
      flex-shrink: 0;
    }
    @media(max-width:640px){ .jobs-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <header class="topbar" id="topbar"></header>

    <div class="page-body">
      <!-- Stats -->
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-card saffron">
          <div class="stat-icon saffron">💼</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-total-jobs">—</div>
            <div class="stat-label">Total Jobs Posted</div>
          </div>
        </div>
        <div class="stat-card emerald">
          <div class="stat-icon emerald">🟢</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-active-jobs">—</div>
            <div class="stat-label">Active Listings</div>
          </div>
        </div>
        <div class="stat-card ruby">
          <div class="stat-icon ruby">🔥</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-urgent-jobs">—</div>
            <div class="stat-label">Urgent Openings</div>
          </div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon blue">🤖</div>
          <div class="stat-info">
            <div class="stat-value">AI</div>
            <div class="stat-label">Auto-Match Workers</div>
          </div>
        </div>
      </div>

      <!-- Filters + Post Button -->
      <div class="card mb-24">
        <div class="flex items-center gap-16 flex-wrap">
          <div class="search-bar" style="flex:1;min-width:200px">
            <span class="search-icon">🔍</span>
            <input type="text" id="job-search" placeholder="Search jobs by title, skill, city..." oninput="filterJobs(this.value)">
          </div>
          <select class="select" id="filter-urgent" onchange="applyJobFilters()" style="width:150px">
            <option value="">All Jobs</option>
            <option value="urgent">🔥 Urgent Only</option>
            <option value="regular">Regular</option>
          </select>
          <select class="select" id="filter-city" onchange="applyJobFilters()" style="width:150px">
            <option value="">All Cities</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="clearJobFilters()">✕ Clear</button>
          <button class="btn btn-primary" onclick="openPostJobModal()">+ Post a Job</button>
        </div>
        <div style="margin-top:12px;font-size:13px;color:var(--text-muted)" id="jobs-count-label">Loading jobs...</div>
      </div>

      <!-- Jobs Grid -->
      <div id="jobs-grid" class="jobs-grid">
        <div class="spinner"></div>
      </div>

      <!-- Pagination -->
      <div id="jobs-pagination" class="pagination"></div>
    </div>
  </main>
</div>

<!-- Post Job Modal -->
<div id="post-job-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center">
  <div class="modal" style="max-width:580px;width:92%;max-height:90vh;overflow-y:auto">
    <div class="modal-header">
      <div class="modal-title">💼 Post a Job</div>
      <button class="modal-close" onclick="closePostJobModal()">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Job Title *</label>
        <input class="input" id="j-title" placeholder="e.g. Electrician for 3BHK rewiring">
      </div>
      <div class="form-group">
        <label class="form-label">Designation *</label>
        <input class="input" id="j-designation" placeholder="e.g. Electrician">
      </div>
      <div class="form-group">
        <label class="form-label">City *</label>
        <input class="input" id="j-city" placeholder="e.g. Mumbai">
      </div>
      <div class="form-group">
        <label class="form-label">State</label>
        <input class="input" id="j-state" placeholder="e.g. Maharashtra">
      </div>
      <div class="form-group">
        <label class="form-label">Min Budget (₹/hr)</label>
        <input class="input" type="number" id="j-budget-min" placeholder="e.g. 400">
      </div>
      <div class="form-group">
        <label class="form-label">Max Budget (₹/hr)</label>
        <input class="input" type="number" id="j-budget-max" placeholder="e.g. 700">
      </div>
      <div class="form-group">
        <label class="form-label">Employer Name *</label>
        <input class="input" id="j-employer" placeholder="Your company/name">
      </div>
      <div class="form-group">
        <label class="form-label">Contact Number</label>
        <input class="input" id="j-contact" placeholder="+91XXXXXXXXXX">
      </div>
      <div class="form-group">
        <label class="form-label">Experience Required (years)</label>
        <input class="input" type="number" id="j-exp" placeholder="0" min="0" max="30">
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px;padding-top:28px">
        <input type="checkbox" id="j-urgent" style="width:16px;height:16px;cursor:pointer">
        <label for="j-urgent" class="form-label" style="margin-bottom:0;cursor:pointer">🔥 Mark as Urgent</label>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Job Description *</label>
        <textarea class="input" id="j-description" rows="3" placeholder="Describe the work, requirements, duration..." style="resize:vertical;padding-top:10px"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-ghost" onclick="closePostJobModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitJob()">💼 Post Job</button>
    </div>
  </div>
</div>

<!-- Job Detail + Matches Modal -->
<div id="job-detail-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center">
  <div class="modal" id="job-detail-content" style="max-width:600px;width:92%;max-height:90vh;overflow-y:auto">
    <div class="spinner"></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/app.js"></script>
<script>
  window.ACTIVE_PAGE = 'jobs';

  const PAGE_SIZE = 12;
  let allJobs = [];
  let currentPage = 1;
  let totalJobs = 0;

  // ── Load jobs ────────────────────────────────────────────────────────────────
  async function loadJobs(page = 1) {
    currentPage = page;
    const grid = document.getElementById('jobs-grid');
    grid.innerHTML = '<div class="spinner"></div>';

    try {
      const data = await api.get(`/api/jobs/?limit=${PAGE_SIZE}&offset=${(page-1)*PAGE_SIZE}`);
      allJobs = data.jobs || [];
      totalJobs = data.total || 0;
      renderJobs(allJobs);
      updateJobStats();
      renderPagination(totalJobs, page);
      document.getElementById('jobs-count-label').textContent = `Showing ${allJobs.length} of ${totalJobs} jobs`;
    } catch (e) {
      grid.innerHTML = `<div style="text-align:center;padding:40px;color:var(--ruby-light)">❌ ${e.message}</div>`;
    }
  }

  // ── Render job cards ─────────────────────────────────────────────────────────
  function renderJobs(jobs) {
    const grid = document.getElementById('jobs-grid');
    if (!jobs.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted)">
        💼 No jobs found. <button class="btn btn-primary btn-sm" onclick="openPostJobModal()" style="margin-left:8px">Post the first one →</button>
      </div>`;
      return;
    }
    grid.innerHTML = jobs.map(j => renderJobCard(j)).join('');
  }

  function renderJobCard(j) {
    const urgentBadge = j.is_urgent ? '<span class="badge badge-danger" style="font-size:10px">🔥 URGENT</span>' : '';
    const daysLeft = j.expires_at
      ? Math.max(0, Math.ceil((new Date(j.expires_at) - Date.now()) / 86400000))
      : 30;

    return `
      <div class="job-card ${j.is_urgent ? 'urgent' : ''}" id="job-card-${j.job_ref}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
              <span style="font-weight:700;color:var(--saffron);font-size:11px">${j.job_ref}</span>
              ${urgentBadge}
              <span class="badge badge-success" style="font-size:10px">${j.is_active ? 'Open' : 'Closed'}</span>
            </div>
            <div style="font-weight:700;font-size:15px;color:var(--text-primary);line-height:1.3">${escHtml(j.title)}</div>
          </div>
          <div style="width:42px;height:42px;border-radius:10px;background:var(--saffron-glow);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">
            💼
          </div>
        </div>

        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
          <div class="worker-tag">💼 ${escHtml(j.designation)}</div>
          <div class="worker-tag">📍 ${escHtml(j.city)}${j.state ? ', ' + escHtml(j.state) : ''}</div>
          ${j.experience_required ? `<div class="worker-tag">⏱️ ${j.experience_required}+ yrs</div>` : ''}
          <div class="worker-tag">🕐 ${daysLeft}d left</div>
        </div>

        <div style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">
          ${escHtml(j.description)}
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:12px">
          <div>
            ${j.budget_min_inr || j.budget_max_inr ? `
              <div style="font-size:16px;font-weight:700;color:var(--emerald-light)">
                ₹${j.budget_min_inr}–${j.budget_max_inr}/hr
              </div>
            ` : '<div style="font-size:13px;color:var(--text-muted)">Rate negotiable</div>'}
            <div style="font-size:11px;color:var(--text-muted)">${escHtml(j.employer_name)}</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-secondary btn-sm" onclick="openJobDetail('${j.job_ref}')">View & Match</button>
            <button class="btn btn-ghost btn-sm" onclick="chatAboutJob('${j.job_ref}', '${escHtml(j.title)}')">💬 Chat</button>
          </div>
        </div>
      </div>
    `;
  }

  // ── Job Detail + Matches ─────────────────────────────────────────────────────
  async function openJobDetail(jobRef) {
    const modal = document.getElementById('job-detail-modal');
    const content = document.getElementById('job-detail-content');
    modal.style.display = 'flex';
    content.innerHTML = '<div style="padding:40px;text-align:center"><div class="spinner"></div></div>';

    try {
      const [job, matchData] = await Promise.all([
        api.get(`/api/jobs/${jobRef}`),
        api.get(`/api/jobs/${jobRef}/matches?top_k=5`),
      ]);

      const matches = matchData.matches || [];
      const urgentBadge = job.is_urgent ? '<span class="badge badge-danger">🔥 Urgent</span>' : '';

      content.innerHTML = `
        <div class="modal-header">
          <div class="modal-title">💼 ${escHtml(job.title)}</div>
          <button class="modal-close" onclick="closeJobDetail()">✕</button>
        </div>

        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
          <span style="font-weight:700;color:var(--saffron);font-size:12px">${job.job_ref}</span>
          ${urgentBadge}
          <span class="badge badge-success">Open</span>
          <span class="badge badge-info">${escHtml(job.designation)}</span>
          <span class="badge badge-default">📍 ${escHtml(job.city)}</span>
        </div>

        <div style="font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:16px;padding:14px;background:var(--bg-input);border-radius:var(--radius-md)">
          ${escHtml(job.description)}
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
          <div style="background:var(--bg-input);border-radius:var(--radius-md);padding:10px;text-align:center">
            <div style="font-size:11px;color:var(--text-muted)">Budget</div>
            <div style="font-weight:700;color:var(--emerald-light);font-size:14px">₹${job.budget_min_inr}–${job.budget_max_inr}/hr</div>
          </div>
          <div style="background:var(--bg-input);border-radius:var(--radius-md);padding:10px;text-align:center">
            <div style="font-size:11px;color:var(--text-muted)">Experience</div>
            <div style="font-weight:700;color:var(--text-primary);font-size:14px">${job.experience_required}+ years</div>
          </div>
          <div style="background:var(--bg-input);border-radius:var(--radius-md);padding:10px;text-align:center">
            <div style="font-size:11px;color:var(--text-muted)">Employer</div>
            <div style="font-weight:700;color:var(--text-primary);font-size:13px">${escHtml(job.employer_name)}</div>
          </div>
        </div>

        <!-- AI-Matched Workers -->
        <div style="margin-bottom:16px">
          <div style="font-weight:700;font-size:14px;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:8px">
            🤖 AI-Matched Workers <span class="badge badge-saffron">${matches.length} found</span>
          </div>
          ${matches.length ? matches.map(w => `
            <div class="match-worker-card">
              <div style="width:36px;height:36px;border-radius:50%;background:var(--grad-hero);display:flex;align-items:center;justify-content:center;font-weight:700;color:white;flex-shrink:0">
                ${(w.full_name || 'W')[0]}
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;font-size:13px;color:var(--text-primary)">${escHtml(w.full_name || '')}</div>
                <div style="font-size:11px;color:var(--saffron)">${escHtml(w.designation || '')}</div>
                <div style="font-size:11px;color:var(--text-muted)">⭐ ${w.rating} · 📍 ${escHtml(w.city || '')} · ₹${w.hourly_rate_inr}/hr</div>
              </div>
              <div class="match-score-badge">${Math.round((w.match_score || 0) * 100)}% match</div>
            </div>
          `).join('') : '<p style="font-size:13px;color:var(--text-muted);padding:10px">No matches found — try <a href="/workers.html" style="color:var(--saffron)">searching workers manually</a>.</p>'}
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="chatAboutJob('${job.job_ref}','${escHtml(job.title)}');closeJobDetail()">
            💬 Enquire via Chat
          </button>
          <a href="/workers.html" class="btn btn-secondary">👷 Browse All Workers</a>
          <button class="btn btn-ghost" onclick="closeJobDetail()">Close</button>
        </div>
      `;
    } catch (e) {
      content.innerHTML = `<div style="padding:20px;color:var(--ruby-light)">❌ ${e.message}<br><button class="btn btn-ghost btn-sm" onclick="closeJobDetail()">Close</button></div>`;
    }
  }

  function closeJobDetail() {
    document.getElementById('job-detail-modal').style.display = 'none';
  }

  // ── Post Job ─────────────────────────────────────────────────────────────────
  function openPostJobModal() {
    document.getElementById('post-job-modal').style.display = 'flex';
  }

  function closePostJobModal() {
    document.getElementById('post-job-modal').style.display = 'none';
  }

  async function submitJob() {
    const title       = document.getElementById('j-title').value.trim();
    const designation = document.getElementById('j-designation').value.trim();
    const city        = document.getElementById('j-city').value.trim();
    const description = document.getElementById('j-description').value.trim();
    const employer    = document.getElementById('j-employer').value.trim();

    if (!title || !designation || !city || !description || !employer) {
      showToast('Please fill all required fields', 'warning');
      return;
    }

    const payload = {
      title, designation, city,
      state: document.getElementById('j-state').value.trim(),
      description, employer_name: employer,
      employer_contact: document.getElementById('j-contact').value.trim(),
      budget_min_inr: parseInt(document.getElementById('j-budget-min').value) || 0,
      budget_max_inr: parseInt(document.getElementById('j-budget-max').value) || 0,
      experience_required: parseInt(document.getElementById('j-exp').value) || 0,
      is_urgent: document.getElementById('j-urgent').checked,
    };

    try {
      await api.post('/api/jobs/', payload);
      showToast('Job posted successfully!', 'success');
      closePostJobModal();
      loadJobs();
    } catch (e) {
      showToast('Failed to post job: ' + e.message, 'error');
    }
  }

  // ── Stats ────────────────────────────────────────────────────────────────────
  async function updateJobStats() {
    try {
      const stats = await api.get('/api/jobs/stats');
      const el = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
      el('stat-total-jobs', stats.total || totalJobs);
      el('stat-active-jobs', stats.active || totalJobs);
      el('stat-urgent-jobs', stats.urgent || 0);
    } catch (e) {}
  }

  // ── Filters ──────────────────────────────────────────────────────────────────
  let filterTimeout;
  function filterJobs(q) {
    clearTimeout(filterTimeout);
    filterTimeout = setTimeout(() => {
      const filtered = allJobs.filter(j =>
        !q ||
        j.title.toLowerCase().includes(q.toLowerCase()) ||
        j.designation.toLowerCase().includes(q.toLowerCase()) ||
        j.city.toLowerCase().includes(q.toLowerCase()) ||
        j.description.toLowerCase().includes(q.toLowerCase())
      );
      renderJobs(filtered);
      document.getElementById('jobs-count-label').textContent = `${filtered.length} results for "${q}"`;
    }, 300);
  }

  function applyJobFilters() {
    const urgent = document.getElementById('filter-urgent').value;
    const city = document.getElementById('filter-city').value;
    const filtered = allJobs.filter(j => {
      const matchUrgent = !urgent || (urgent === 'urgent' && j.is_urgent) || (urgent === 'regular' && !j.is_urgent);
      const matchCity = !city || j.city.toLowerCase().includes(city.toLowerCase());
      return matchUrgent && matchCity;
    });
    renderJobs(filtered);
  }

  function clearJobFilters() {
    document.getElementById('job-search').value = '';
    document.getElementById('filter-urgent').value = '';
    document.getElementById('filter-city').value = '';
    renderJobs(allJobs);
    document.getElementById('jobs-count-label').textContent = `Showing ${allJobs.length} of ${totalJobs} jobs`;
  }

  // ── Load filter options ──────────────────────────────────────────────────────
  function buildCityFilter() {
    const cities = [...new Set(allJobs.map(j => j.city))].filter(Boolean).sort();
    const sel = document.getElementById('filter-city');
    sel.innerHTML = '<option value="">All Cities</option>' +
      cities.map(c => `<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');
  }

  // ── Pagination ───────────────────────────────────────────────────────────────
  function renderPagination(total, current) {
    const pages = Math.ceil(total / PAGE_SIZE);
    if (pages <= 1) { document.getElementById('jobs-pagination').innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= pages; i++) {
      html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="loadJobs(${i})">${i}</button>`;
    }
    document.getElementById('jobs-pagination').innerHTML = html;
  }

  // ── Chat about job ───────────────────────────────────────────────────────────
  function chatAboutJob(jobRef, title) {
    sessionStorage.setItem('sahayak_prefill', `I want to find a worker for this job: "${title}" (${jobRef}). Please help me.`);
    window.location.href = '/chat.html';
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    buildSidebar('jobs');
    buildTopbar('💼 Job Postings', 'AI-Powered Job Board');
    loadJobs().then(() => buildCityFilter());
  });

  // Close modals on backdrop click
  document.getElementById('post-job-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('post-job-modal')) closePostJobModal();
  });
  document.getElementById('job-detail-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('job-detail-modal')) closeJobDetail();
  });
</script>
</body>
</html>
