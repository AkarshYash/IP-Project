<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sahayak — Fraud Alerts</title>
  <meta name="description" content="AI-powered Fraud Detection and Risk Management">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    /* Risk score color tiers */
    .risk-high   { color: var(--ruby-light); }
    .risk-medium { color: var(--amber-light); }
    .risk-low    { color: var(--emerald-light); }

    .risk-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .risk-bar {
      flex: 1;
      max-width: 200px;
      height: 7px;
      background: var(--bg-input);
      border-radius: 10px;
      overflow: hidden;
    }
    .risk-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s ease;
    }
    .risk-score-text {
      font-size: 12px;
      font-weight: 700;
      min-width: 60px;
    }

    .alert-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .alert-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: var(--radius-lg) 0 0 var(--radius-lg);
    }
    .alert-card.risk-tier-high::before    { background: var(--ruby-light); }
    .alert-card.risk-tier-medium::before  { background: var(--amber-light); }
    .alert-card.risk-tier-low::before     { background: var(--emerald-light); }
    .alert-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .alert-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      flex-wrap: wrap;
    }
    .alert-icon {
      width: 42px; height: 42px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .alert-icon.high   { background: rgba(239,68,68,0.12); }
    .alert-icon.medium { background: rgba(245,158,11,0.12); }
    .alert-icon.low    { background: rgba(16,185,129,0.12); }

    .alert-body { flex: 1; min-width: 200px; }
    .alert-actions { display: flex; flex-direction: column; gap: 7px; flex-shrink: 0; }
    .alert-actions button { width: 128px; justify-content: center; }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .status-badge-open          { background: rgba(239,68,68,0.12);   color: var(--ruby-light);    border: 1px solid rgba(239,68,68,0.2); }
    .status-badge-investigating { background: rgba(245,158,11,0.12);  color: var(--amber-light);   border: 1px solid rgba(245,158,11,0.2); }
    .status-badge-suspended     { background: rgba(220,38,38,0.15);   color: #FF6B6B;              border: 1px solid rgba(220,38,38,0.25); }
    .status-badge-cleared       { background: rgba(16,185,129,0.12);  color: var(--emerald-light); border: 1px solid rgba(16,185,129,0.2); }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stats-strip-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: var(--transition);
    }
    .stats-strip-card:hover { border-color: var(--saffron); }
    .ssc-icon { font-size: 24px; }
    .ssc-val  { font-size: 22px; font-weight: 700; font-family: 'Poppins', sans-serif; color: var(--text-primary); line-height: 1; }
    .ssc-lbl  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .empty-fraud {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-fraud .eficon { font-size: 56px; margin-bottom: 12px; }
    .empty-fraud h3 { font-size: 16px; color: var(--text-primary); margin-bottom: 6px; }
    .empty-fraud p  { font-size: 14px; color: var(--text-muted); }

    /* Alert type color map */
    .type-spam       { color: #F59E0B; }
    .type-fake       { color: #EF4444; }
    .type-duplicate  { color: #8B5CF6; }
    .type-suspicious { color: #3B82F6; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <header class="topbar" id="topbar"></header>
    <div class="page-body">

      <!-- Stats Strip -->
      <div class="stats-strip" id="fraud-stats">
        <div class="stats-strip-card" style="border-top:3px solid var(--ruby-light)">
          <div class="ssc-icon">🚨</div>
          <div>
            <div class="ssc-val" id="fs-total">—</div>
            <div class="ssc-lbl">Total Alerts</div>
          </div>
        </div>
        <div class="stats-strip-card" style="border-top:3px solid var(--ruby-light)">
          <div class="ssc-icon">🔴</div>
          <div>
            <div class="ssc-val" id="fs-open">—</div>
            <div class="ssc-lbl">Open</div>
          </div>
        </div>
        <div class="stats-strip-card" style="border-top:3px solid var(--amber-light)">
          <div class="ssc-icon">🔍</div>
          <div>
            <div class="ssc-val" id="fs-investigating">—</div>
            <div class="ssc-lbl">Investigating</div>
          </div>
        </div>
        <div class="stats-strip-card" style="border-top:3px solid var(--ruby)">
          <div class="ssc-icon">🚫</div>
          <div>
            <div class="ssc-val" id="fs-suspended">—</div>
            <div class="ssc-lbl">Suspended</div>
          </div>
        </div>
        <div class="stats-strip-card" style="border-top:3px solid var(--emerald-light)">
          <div class="ssc-icon">✅</div>
          <div>
            <div class="ssc-val" id="fs-cleared">—</div>
            <div class="ssc-lbl">Cleared</div>
          </div>
        </div>
        <div class="stats-strip-card" style="border-top:3px solid #EF4444">
          <div class="ssc-icon">⚠️</div>
          <div>
            <div class="ssc-val" id="fs-high-risk">—</div>
            <div class="ssc-lbl">High Risk (75+)</div>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-group">
        <div class="search-bar" style="flex:1;min-width:200px;max-width:340px">
          <span class="search-icon">🔍</span>
          <input type="text" id="fraud-search" placeholder="Search by name, type, ref…" oninput="applyFilters()">
        </div>
        <select class="select" id="filter-status" onchange="applyFilters()" style="width:155px">
          <option value="">All Status</option>
          <option value="open">Open</option>
          <option value="investigating">Investigating</option>
          <option value="suspended">Suspended</option>
          <option value="cleared">Cleared</option>
        </select>
        <select class="select" id="filter-risk" onchange="applyFilters()" style="width:145px">
          <option value="">All Risk Levels</option>
          <option value="high">🔴 High (75+)</option>
          <option value="medium">🟡 Medium (50-74)</option>
          <option value="low">🟢 Low (&lt;50)</option>
        </select>
        <select class="select" id="filter-type" onchange="applyFilters()" style="width:155px">
          <option value="">All Alert Types</option>
          <option value="spam">Spam</option>
          <option value="fake_profile">Fake Profile</option>
          <option value="duplicate">Duplicate Account</option>
          <option value="suspicious_activity">Suspicious Activity</option>
          <option value="payment_fraud">Payment Fraud</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="loadFraud()">↻ Refresh</button>
      </div>

      <!-- Alert Cards -->
      <div id="fraud-container" style="display:flex;flex-direction:column;gap:14px">
        <div style="text-align:center;padding:40px">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Pagination -->
      <div id="fraud-pagination" class="pagination" style="padding:20px 0 4px"></div>

    </div>
  </main>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/app.js"></script>
<script>
  window.ACTIVE_PAGE = 'fraud';

  let allAlerts = [];

  // ── Risk helpers ──────────────────────────────────────────────────────────────
  function getRiskTier(score) {
    if (score >= 75) return 'high';
    if (score >= 50) return 'medium';
    return 'low';
  }

  function getRiskColor(score) {
    if (score >= 75) return 'var(--ruby-light)';
    if (score >= 50) return 'var(--amber-light)';
    return 'var(--emerald-light)';
  }

  function getRiskLabel(score) {
    if (score >= 75) return '🔴 HIGH';
    if (score >= 50) return '🟡 MEDIUM';
    return '🟢 LOW';
  }

  function getRiskIcon(score) {
    if (score >= 75) return '🚨';
    if (score >= 50) return '⚠️';
    return 'ℹ️';
  }

  // ── Status badge ──────────────────────────────────────────────────────────────
  function statusBadge(status) {
    const cls = {
      open:          'badge-danger',
      investigating: 'badge-warning',
      suspended:     'badge-danger',
      cleared:       'badge-success',
    };
    const icons = { open:'🔴', investigating:'🔍', suspended:'🚫', cleared:'✅' };
    return `<span class="badge ${cls[status] || 'badge-default'}">${icons[status] || ''} ${status}</span>`;
  }

  // ── Load all fraud alerts ─────────────────────────────────────────────────────
  async function loadFraud() {
    const container = document.getElementById('fraud-container');
    container.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner"></div></div>';

    try {
      const data = await api.get('/api/fraud/');
      allAlerts = data.alerts || [];
      updateStats(allAlerts);
      applyFilters();
    } catch (e) {
      container.innerHTML = `
        <div class="alert-card" style="text-align:center;padding:40px">
          <div style="font-size:36px;margin-bottom:12px">❌</div>
          <div style="color:var(--ruby-light);font-weight:600">${e.message}</div>
          <div style="color:var(--text-muted);font-size:13px;margin-top:6px">Make sure the backend is running</div>
        </div>
      `;
    }
  }

  // ── Apply filters + render ────────────────────────────────────────────────────
  function applyFilters() {
    const search = document.getElementById('fraud-search').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const risk   = document.getElementById('filter-risk').value;
    const type   = document.getElementById('filter-type').value;

    const filtered = allAlerts.filter(a => {
      const tier = getRiskTier(a.risk_score || 0);
      const matchSearch = !search ||
        (a.suspect_name || '').toLowerCase().includes(search) ||
        (a.alert_ref || '').toLowerCase().includes(search) ||
        (a.alert_type || '').toLowerCase().includes(search) ||
        (a.description || '').toLowerCase().includes(search);
      const matchStatus = !status || a.status === status;
      const matchRisk   = !risk   || tier === risk;
      const matchType   = !type   || (a.alert_type || '').replace(/ /g,'_') === type;
      return matchSearch && matchStatus && matchRisk && matchType;
    });

    renderAlerts(filtered);
  }

  // ── Render alert cards ────────────────────────────────────────────────────────
  function renderAlerts(list) {
    const container = document.getElementById('fraud-container');

    if (!list.length) {
      container.innerHTML = `
        <div class="empty-fraud">
          <div class="eficon">✅</div>
          <h3>No Fraud Alerts Found</h3>
          <p>No alerts match current filters, or the platform is fraud-free.</p>
        </div>
      `;
      return;
    }

    // Sort by risk score descending
    const sorted = [...list].sort((a, b) => (b.risk_score || 0) - (a.risk_score || 0));

    container.innerHTML = sorted.map(a => {
      const score = a.risk_score || 0;
      const tier  = getRiskTier(score);
      const color = getRiskColor(score);
      const isActionable = a.status === 'open' || a.status === 'investigating';

      return `
        <div class="alert-card risk-tier-${tier}" id="alert-card-${a.id}">
          <div class="alert-header">

            <div class="alert-icon ${tier}">${getRiskIcon(score)}</div>

            <div class="alert-body">
              <!-- Top meta row -->
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
                <span style="font-weight:700;color:var(--saffron);font-size:12px;letter-spacing:0.04em">
                  ${a.alert_ref || '#F-' + a.id}
                </span>
                <span class="badge" style="background:${color}18;color:${color};border:1px solid ${color}33">
                  ${getRiskLabel(score)}
                </span>
                <span class="badge badge-default" style="text-transform:capitalize">
                  ${(a.alert_type || 'unknown').replace(/_/g,' ')}
                </span>
                ${statusBadge(a.status || 'open')}
              </div>

              <!-- Suspect name -->
              <div style="font-weight:700;font-size:15px;color:var(--text-primary);margin-bottom:5px">
                👤 ${a.suspect_name || 'Unknown User'}
              </div>

              <!-- Description -->
              <div style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:10px">
                ${a.description || 'Suspicious activity detected by AI moderation system.'}
              </div>

              <!-- Risk score bar -->
              <div class="risk-bar-wrap">
                <div class="risk-bar">
                  <div class="risk-fill" style="width:${score}%;background:${color}"></div>
                </div>
                <span class="risk-score-text" style="color:${color}">
                  ${score}/100
                </span>
                <span style="font-size:11px;color:var(--text-muted)">risk score</span>
              </div>

              <!-- Timestamps -->
              <div style="font-size:11px;color:var(--text-muted);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap">
                <span>🕐 Detected: ${formatDate(a.created_at)}</span>
                ${a.updated_at !== a.created_at ? `<span>📝 Updated: ${timeAgo(a.updated_at)}</span>` : ''}
                ${a.resolved_at ? `<span>✅ Resolved: ${formatDate(a.resolved_at)}</span>` : ''}
              </div>
            </div>

            <!-- Action buttons -->
            ${isActionable ? `
              <div class="alert-actions">
                ${a.status === 'open' ? `
                  <button class="btn btn-ghost btn-sm" onclick="fraudAction(${a.id},'investigate')"
                    style="border-color:var(--amber-light);color:var(--amber-light)">
                    🔍 Investigate
                  </button>
                ` : ''}
                <button class="btn btn-ghost btn-sm" onclick="fraudAction(${a.id},'suspend')"
                  style="border-color:var(--ruby-light);color:var(--ruby-light)">
                  🚫 Suspend
                </button>
                <button class="btn btn-ghost btn-sm" onclick="fraudAction(${a.id},'clear')"
                  style="border-color:var(--emerald-light);color:var(--emerald-light)">
                  ✅ Clear
                </button>
              </div>
            ` : `
              <div style="align-self:flex-start">
                ${statusBadge(a.status)}
              </div>
            `}

          </div>
        </div>
      `;
    }).join('');
  }

  // ── Action ────────────────────────────────────────────────────────────────────
  async function fraudAction(id, action) {
    const confirm_msg = {
      investigate: 'Mark this alert as under investigation?',
      suspend: 'Suspend this user? This will restrict their account.',
      clear: 'Clear this fraud alert? This marks it as a false positive.',
    };

    if (!confirm(confirm_msg[action] || `Confirm ${action}?`)) return;

    // Optimistic UI update
    const card = document.getElementById(`alert-card-${id}`);
    if (card) card.style.opacity = '0.6';

    try {
      await api.patch(`/api/fraud/${id}/action`, { action });
      showToast(
        action === 'clear' ? '✅ Alert cleared — marked as false positive'
        : action === 'suspend' ? '🚫 User suspended successfully'
        : '🔍 Alert moved to investigating',
        'success'
      );
      loadFraud();
    } catch (e) {
      if (card) card.style.opacity = '1';
      showToast('Action failed: ' + e.message, 'error');
    }
  }

  // ── Update stats strip ────────────────────────────────────────────────────────
  function updateStats(list) {
    const count = (pred) => list.filter(pred).length;
    const el = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };

    el('fs-total',        list.length);
    el('fs-open',         count(a => a.status === 'open'));
    el('fs-investigating', count(a => a.status === 'investigating'));
    el('fs-suspended',    count(a => a.status === 'suspended'));
    el('fs-cleared',      count(a => a.status === 'cleared'));
    el('fs-high-risk',    count(a => (a.risk_score || 0) >= 75));
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    buildSidebar('fraud');
    buildTopbar('🚨 Fraud Alerts', 'AI-Powered Risk Detection');
    loadFraud();
    // Auto-refresh every 60s
    setInterval(loadFraud, 60000);
  });
</script>
</body>
</html>
